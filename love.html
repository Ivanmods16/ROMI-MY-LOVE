<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Atrapa mi corazón 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #ff9a9e;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        #ui {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 20;
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.5);
        }

        .ui-box {
            font-size: 1.1rem;
            font-weight: 700;
            color: #c0395a;
        }

        #title-ui {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #ff5c7a;
        }

        #screen-start, #screen-end {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(160deg, #ff9a9e 0%, #fecfef 100%);
            padding: 30px;
        }

        #screen-end { display: none; }

        .screen-card {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            padding: 36px 30px;
            max-width: 360px;
            width: 92%;
            box-shadow: 0 20px 60px rgba(255,100,130,0.25);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .screen-card h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.4rem;
            color: #ff5c7a;
            margin-bottom: 8px;
        }

        .screen-card h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #ff5c7a;
            margin-bottom: 8px;
        }

        .screen-card p {
            color: #996;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 18px;
        }

        .legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 22px;
            text-align: left;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: #664;
        }

        /* Mini corazón SVG para leyenda */
        .legend-svg { width: 28px; height: 28px; flex-shrink: 0; }

        .btn-play {
            padding: 14px 40px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,117,140,0.45);
            transition: transform 0.2s;
        }

        .btn-play:hover, .btn-play:active {
            transform: scale(0.97);
        }

        #final-score {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #ff5c7a;
            margin: 8px 0 4px;
        }

        #final-msg {
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: #aa7;
            margin-bottom: 20px;
        }

        .btn-back {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 25px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            border: 2px solid #ff758c;
            border-radius: 50px;
            background: transparent;
            color: #ff758c;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: #ff758c;
            color: white;
        }

        .deco-heart {
            font-size: 2.5rem;
            animation: latido 1.2s ease-in-out infinite;
            display: inline-block;
            margin-bottom: 8px;
        }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
    <div class="ui-box">❤️ <span id="score-display">0</span></div>
    <div id="title-ui">Atrapa mi corazón</div>
    <div class="ui-box">🖤 <span id="lives-display">3</span></div>
</div>

<!-- Pantalla de inicio -->
<div id="screen-start">
    <div class="screen-card">
        <div class="deco-heart">💖</div>
        <h1>Atrapa mi corazón</h1>
        <p>Mové la cesta para atrapar los corazones de Ivan… ¡pero cuidado con los rotos!</p>
        <div class="legend">
            <div class="legend-item">
                <svg class="legend-svg" viewBox="0 0 40 36"><path d="M20 34 C20 34 2 22 2 12 A9 9 0 0 1 20 8 A9 9 0 0 1 38 12 C38 22 20 34 20 34Z" fill="#ff5c7a"/></svg>
                <span>Corazón rosa = +1 punto</span>
            </div>
            <div class="legend-item">
                <svg class="legend-svg" viewBox="0 0 40 36"><path d="M20 34 C20 34 2 22 2 12 A9 9 0 0 1 20 8 A9 9 0 0 1 38 12 C38 22 20 34 20 34Z" fill="#f1c40f"/></svg>
                <span>Corazón dorado = +3 puntos</span>
            </div>
            <div class="legend-item">
                <svg class="legend-svg" viewBox="0 0 40 36">
                    <path d="M20 34 C20 34 2 22 2 12 A9 9 0 0 1 20 8 A9 9 0 0 1 38 12 C38 22 20 34 20 34Z" fill="#aaa"/>
                    <line x1="12" y1="14" x2="28" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    <line x1="28" y1="14" x2="12" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <span>Corazón roto = pierdes una vida</span>
            </div>
        </div>
        <button class="btn-play" onclick="startGame()">¡Jugar! 🎮</button>
        <br>
        <a href="index.html" class="btn-back">← Volver a la carta</a>
    </div>
</div>

<!-- Pantalla de fin -->
<div id="screen-end">
    <div class="screen-card">
        <div class="deco-heart">💔</div>
        <h2>¡Juego terminado!</h2>
        <div id="final-score">0</div>
        <div id="final-msg"></div>
        <button class="btn-play" onclick="restartGame()">Volver a jugar 💖</button>
        <br>
        <a href="index.html" class="btn-back">← Volver a la carta</a>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    basket.y = canvas.height - 90;
}

window.addEventListener("resize", resize);

let score = 0;
let lives = 3;
let speed = 3;
let running = false;
let spawnInterval = null;
let animFrame = null;

const basket = {
    x: 200,
    y: 500,
    w: 100,
    h: 34
};

let items = [];
let particles = [];

// ── Controles ──────────────────────────────────────────────
document.addEventListener("mousemove", e => {
    if (running) basket.x = e.clientX;
});
document.addEventListener("touchmove", e => {
    e.preventDefault();
    if (running) basket.x = e.touches[0].clientX;
}, { passive: false });
document.addEventListener("touchstart", e => {
    if (running) basket.x = e.touches[0].clientX;
}, { passive: false });

// ── Dibujar corazón con canvas puro ───────────────────────
function drawHeart(x, y, size, color, alpha = 1, broken = false) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;

    // Sombra suave
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;

    ctx.beginPath();
    const s = size * 0.5;
    ctx.moveTo(x, y + s * 0.3);
    ctx.bezierCurveTo(x, y - s * 0.5, x - s, y - s * 0.5, x - s, y);
    ctx.bezierCurveTo(x - s, y + s * 0.6, x, y + s * 1.1, x, y + s * 1.3);
    ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 0.6, x + s, y);
    ctx.bezierCurveTo(x + s, y - s * 0.5, x, y - s * 0.5, x, y + s * 0.3);
    ctx.fill();

    // Cruz si es broken
    if (broken) {
        ctx.strokeStyle = "rgba(255,255,255,0.85)";
        ctx.lineWidth = size * 0.1;
        ctx.lineCap = "round";
        ctx.shadowBlur = 0;
        const cx = x, cy = y + s * 0.5;
        const r = s * 0.55;
        ctx.beginPath();
        ctx.moveTo(cx - r, cy - r);
        ctx.lineTo(cx + r, cy + r);
        ctx.moveTo(cx + r, cy - r);
        ctx.lineTo(cx - r, cy + r);
        ctx.stroke();
    }

    ctx.restore();
}

// ── Spawn ──────────────────────────────────────────────────
function spawnItem() {
    const rand = Math.random();
    let type;
    if (rand < 0.65) type = "heart";
    else if (rand < 0.80) type = "gold";
    else type = "broken";

    items.push({
        x: Math.random() * (canvas.width - 60) + 30,
        y: -30,
        vy: speed + Math.random() * 1.5,
        type,
        size: type === "gold" ? 32 : 26,
        color: type === "heart" ? "#ff5c7a" : type === "gold" ? "#f1c40f" : "#999",
        spin: (Math.random() - 0.5) * 0.06
    });
}

// ── Partículas ─────────────────────────────────────────────
function spawnParticles(x, y, color) {
    for (let i = 0; i < 10; i++) {
        const angle = (Math.PI * 2 / 10) * i;
        particles.push({
            x, y,
            vx: Math.cos(angle) * (2 + Math.random() * 3),
            vy: Math.sin(angle) * (2 + Math.random() * 3),
            life: 1,
            color,
            size: 5 + Math.random() * 5
        });
    }
}

// ── Cesta ──────────────────────────────────────────────────
function drawBasket(x, y, w, h) {
    ctx.save();
    ctx.shadowColor = "rgba(255,100,130,0.5)";
    ctx.shadowBlur = 18;

    // Fondo blanco traslúcido
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.strokeStyle = "#ff758c";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(x - w / 2, y - h / 2, w, h, 17);
    ctx.fill();
    ctx.stroke();

    // Mini corazón en el centro de la cesta
    ctx.shadowBlur = 0;
    drawHeart(x, y - 6, 14, "#ff758c");

    ctx.restore();
}

// ── Fondo degradado ────────────────────────────────────────
function drawBg() {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, "#ff9a9e");
    grad.addColorStop(0.55, "#fad0c4");
    grad.addColorStop(1, "#ffecd2");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ── UI ─────────────────────────────────────────────────────
function updateUI() {
    document.getElementById("score-display").textContent = score;
    document.getElementById("lives-display").textContent = lives;
}

function gameOver() {
    running = false;
    clearInterval(spawnInterval);
    cancelAnimationFrame(animFrame);
    document.getElementById("ui").style.display = "none";
    document.getElementById("final-score").textContent = score + " pts";

    let msg = "";
    if (score >= 30) msg = "¡Sos increíble mi Romiuu! 💖✨";
    else if (score >= 15) msg = "¡Muy bien! Ivan está orgulloso 💕";
    else if (score >= 5) msg = "¡Casi! Intentalo de nuevo 🌸";
    else msg = "¡Dale otra oportunidad! 💌";

    document.getElementById("final-msg").textContent = msg;
    document.getElementById("screen-end").style.display = "flex";
}

function startGame() {
    score = 0; lives = 3; speed = 3;
    items = []; particles = [];
    document.getElementById("screen-start").style.display = "none";
    document.getElementById("screen-end").style.display = "none";
    document.getElementById("ui").style.display = "flex";
    running = true;
    updateUI();
    clearInterval(spawnInterval);
    cancelAnimationFrame(animFrame);
    spawnInterval = setInterval(spawnItem, 850);
    loop();
}

function restartGame() { startGame(); }

// ── Loop principal ─────────────────────────────────────────
function loop() {
    if (!running) return;

    drawBg();

    // Items
    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.vy;

        drawHeart(item.x, item.y, item.size, item.color, 1, item.type === "broken");

        // Colisión con cesta
        const bLeft  = basket.x - basket.w / 2;
        const bRight = basket.x + basket.w / 2;
        const bTop   = basket.y - basket.h / 2;
        const bBot   = basket.y + basket.h / 2;

        if (
            item.x + item.size > bLeft &&
            item.x - item.size < bRight &&
            item.y + item.size > bTop &&
            item.y - item.size < bBot
        ) {
            if (item.type === "heart") {
                score += 1;
                spawnParticles(item.x, item.y, "#ff5c7a");
            } else if (item.type === "gold") {
                score += 3;
                spawnParticles(item.x, item.y, "#f1c40f");
            } else {
                lives -= 1;
                spawnParticles(item.x, item.y, "#aaa");
                if (lives <= 0) { gameOver(); return; }
            }
            items.splice(i, 1);
            updateUI();
            speed = 3 + score * 0.07;
            continue;
        }

        if (item.y > canvas.height + 50) {
            items.splice(i, 1);
        }
    }

    // Partículas
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life -= 0.045;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    drawBasket(basket.x, basket.y, basket.w, basket.h);

    animFrame = requestAnimationFrame(loop);
}

// Init
resize();
</script>
</body>
</html>
