<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000;
  --surface: #1a1a1a;
  --surface2: #262626;
  --border: #2a2a2a;
  --text: #ffffff;
  --text2: #a8a8a8;
  --accent: #0095f6;
  --sent-bg: #0095f6;
  --recv-bg: #262626;
  --input-bg: #1a1a1a;
  --danger: #ed4956;
  --online: #09c669;
  --radius-bubble: 22px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* TEMAS */
[data-theme="ig-dark"] { --bg:#000;--surface:#1a1a1a;--surface2:#262626;--border:#2a2a2a;--sent-bg:#0095f6;--recv-bg:#262626; }
[data-theme="ig-light"] { --bg:#fff;--surface:#f0f0f0;--surface2:#e0e0e0;--border:#dbdbdb;--text:#000;--text2:#737373;--sent-bg:#0095f6;--recv-bg:#efefef;--input-bg:#efefef; }
[data-theme="midnight"] { --bg:#0d0d1a;--surface:#1a1a2e;--surface2:#16213e;--border:#0f3460;--sent-bg:#7c3aed;--recv-bg:#1a1a2e;--accent:#7c3aed; }
[data-theme="forest"] { --bg:#0a1628;--surface:#112240;--surface2:#1b3a4b;--border:#1e4d3f;--sent-bg:#06d6a0;--recv-bg:#112240;--accent:#06d6a0;--text2:#8ecae6; }
[data-theme="sunset"] { --bg:#1a0a00;--surface:#2d1b00;--surface2:#3d2600;--border:#5c3000;--sent-bg:#f77f00;--recv-bg:#2d1b00;--accent:#f77f00; }
[data-theme="rose"] { --bg:#0d0008;--surface:#1a0015;--surface2:#26001f;--border:#3d002e;--sent-bg:#e91e8c;--recv-bg:#1a0015;--accent:#e91e8c; }

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ════════════════════════════════
   LOGIN
════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; justify-content: center; align-items: center;
  z-index: 1000; flex-direction: column; gap: 0;
  padding: 30px;
}

.login-logo {
  font-size: 48px; letter-spacing: -1px; font-weight: 700;
  background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px; font-family: 'Billabong', cursive;
}

.login-logo-sub { font-size: 13px; color: var(--text2); margin-bottom: 32px; letter-spacing: 2px; text-transform: uppercase; }

.avatar-picker {
  width: 90px; height: 90px; border-radius: 50%;
  border: 3px dashed var(--border); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; margin: 0 auto 20px; position: relative; overflow: hidden;
  background: var(--surface);
}
.avatar-picker img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.avatar-picker-label { font-size: 10px; color: var(--text2); }
.avatar-ring {
  width: 96px; height: 96px; border-radius: 50%; padding: 3px;
  background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  margin: 0 auto 20px; display: none;
}
.avatar-ring-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; border: 3px solid var(--bg); }
.avatar-ring-inner img { width: 100%; height: 100%; object-fit: cover; }

.login-input {
  width: 100%; max-width: 340px; background: var(--surface);
  border: 1px solid var(--border); padding: 13px 16px;
  border-radius: 12px; color: var(--text); font-size: 15px;
  outline: none; margin-bottom: 12px; display: block;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--accent); }

.login-btn {
  width: 100%; max-width: 340px; background: var(--accent);
  color: #fff; border: none; padding: 14px; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s;
}
.login-btn:active { opacity: 0.85; }

/* ════════════════════════════════
   HEADER
════════════════════════════════ */
#chat-header {
  display: none; align-items: center; padding: 10px 16px;
  background: var(--bg); z-index: 100; gap: 12px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
}

.back-btn { font-size: 24px; cursor: pointer; color: var(--text); line-height: 1; }

.header-avatar {
  width: 38px; height: 38px; border-radius: 50%; overflow: hidden;
  flex-shrink: 0; cursor: pointer;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; color: var(--text);
}
.header-avatar.has-story {
  padding: 2px;
  background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}
.header-avatar.has-story .avatar-inner {
  width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
  border: 2px solid var(--bg); background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
}
.header-avatar img, .header-avatar.has-story .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }

.header-info { flex: 1; min-width: 0; }
.header-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-status { font-size: 12px; color: var(--online); display: flex; align-items: center; gap: 4px; }
.header-status::before { content: ""; width: 6px; height: 6px; background: var(--online); border-radius: 50%; display: inline-block; }

.header-actions { display: flex; gap: 18px; }
.header-icon { font-size: 22px; cursor: pointer; color: var(--text); }

/* ════════════════════════════════
   MENSAJES
════════════════════════════════ */
#messages {
  flex: 1; overflow-y: auto; padding: 12px 12px 20px;
  display: none; flex-direction: column; gap: 3px;
  background: var(--bg);
  transition: background 0.3s;
}

#messages::-webkit-scrollbar { width: 0; }

.msg-date-divider {
  text-align: center; font-size: 11px; color: var(--text2);
  margin: 10px 0; user-select: none;
}

.message-row {
  display: flex; width: 100%; position: relative;
  align-items: flex-end; gap: 8px;
}
.row-sent { justify-content: flex-end; }
.row-received { justify-content: flex-start; padding-left: 4px; }

/* Avatar pequeño al lado del mensaje recibido */
.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%; overflow: hidden;
  flex-shrink: 0; background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
.msg-avatar-placeholder { width: 28px; flex-shrink: 0; }

.bubble-wrap { display: flex; flex-direction: column; max-width: 72%; gap: 4px; }
.row-sent .bubble-wrap { align-items: flex-end; }
.row-received .bubble-wrap { align-items: flex-start; }

.msg-sender-name {
  font-size: 11px; color: var(--text2); padding: 0 4px;
  display: none;
}

.bubble {
  padding: 10px 14px; font-size: 15px; line-height: 1.45;
  position: relative; cursor: pointer; word-break: break-word;
  max-width: 100%;
}

.sent {
  background: var(--sent-bg); color: #fff;
  border-radius: 22px 22px 4px 22px;
}
.received {
  background: var(--recv-bg); color: var(--text);
  border-radius: 22px 22px 22px 4px;
}

/* Imagen en burbuja */
.bubble img.msg-image {
  max-width: 200px; max-height: 250px; border-radius: 14px;
  display: block; object-fit: cover; cursor: pointer;
}

/* Audio en burbuja */
.audio-player {
  display: flex; align-items: center; gap: 10px; min-width: 180px;
}
.audio-play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.2); border: none;
  color: #fff; font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.2s;
}
.audio-play-btn:hover { background: rgba(255,255,255,0.3); }
.audio-waveform {
  flex: 1; height: 28px; display: flex; align-items: center; gap: 2px;
  cursor: pointer; position: relative;
}
.wave-bar {
  width: 3px; background: rgba(255,255,255,0.5);
  border-radius: 2px; transition: background 0.1s;
}
.wave-bar.played { background: rgba(255,255,255,0.9); }
.audio-duration { font-size: 11px; opacity: 0.7; min-width: 28px; text-align: right; }

/* Reacciones */
.reaction-row {
  display: flex; gap: 4px; flex-wrap: wrap;
  padding: 0 4px; min-height: 0;
}
.react-chip {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 2px 7px; font-size: 13px;
  cursor: pointer; transition: transform 0.15s;
  display: flex; align-items: center; gap: 2px;
}
.react-chip:hover { transform: scale(1.15); }
.react-chip span.count { font-size: 10px; color: var(--text2); }

/* Estado del mensaje (enviado/leído) */
.msg-status { font-size: 10px; color: rgba(255,255,255,0.55); display: block; text-align: right; margin-top: 2px; }

/* ════════════════════════════════
   REPLY PREVIEW
════════════════════════════════ */
#reply-preview {
  display: none; padding: 8px 16px; background: var(--surface);
  border-top: 1px solid var(--border);
  align-items: center; gap: 10px;
}
.reply-bar { width: 3px; background: var(--accent); border-radius: 3px; align-self: stretch; }
.reply-content { flex: 1; min-width: 0; }
.reply-name { font-size: 11px; color: var(--accent); font-weight: 600; }
.reply-text { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reply-close { font-size: 20px; color: var(--text2); cursor: pointer; }

/* Mensaje con respuesta */
.bubble-replied { border-left: 3px solid rgba(255,255,255,0.3); padding-left: 8px; margin-bottom: 6px; opacity: 0.7; font-size: 12px; border-radius: 0; cursor: default; }
.bubble-replied .replied-name { font-size: 10px; font-weight: 600; display: block; margin-bottom: 2px; }

/* ════════════════════════════════
   INPUT BAR
════════════════════════════════ */
#input-bar {
  display: none; align-items: flex-end; padding: 8px 12px 10px;
  background: var(--bg); border-top: 1px solid var(--border); gap: 10px;
}

.input-action-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: transparent; border: none; color: var(--text2);
  font-size: 22px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: color 0.2s;
}
.input-action-btn:hover { color: var(--text); }

.input-wrapper {
  flex: 1; background: var(--input-bg); border-radius: 22px;
  padding: 8px 14px; display: flex; align-items: flex-end; gap: 8px;
  border: 1px solid var(--border); min-height: 40px;
  transition: border-color 0.2s;
}
.input-wrapper:focus-within { border-color: var(--border); }

#msg-input {
  flex: 1; background: transparent; border: none; color: var(--text);
  outline: none; font-size: 15px; max-height: 100px; resize: none;
  line-height: 1.4; font-family: var(--font); align-self: center;
}
#msg-input::placeholder { color: var(--text2); }

.emoji-btn-inner { color: var(--text2); font-size: 20px; cursor: pointer; }

#send-btn {
  display: none; color: var(--accent); font-weight: 600;
  font-size: 15px; cursor: pointer; white-space: nowrap;
  padding: 0; background: none; border: none;
  font-family: var(--font);
}

/* Botón de audio */
#audio-record-btn { color: var(--text2); }
#audio-record-btn.recording { color: var(--danger); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Indicador de grabación */
#recording-indicator {
  display: none; align-items: center; gap: 8px;
  color: var(--danger); font-size: 13px;
}

/* ════════════════════════════════
   MENÚ CONTEXTUAL
════════════════════════════════ */
#context-menu {
  display: none; position: fixed; background: var(--surface);
  border: 1px solid var(--border); border-radius: 16px;
  width: 220px; z-index: 3000; overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
}

.react-bar {
  display: flex; justify-content: space-around; padding: 12px 10px;
  border-bottom: 1px solid var(--border);
}
.react-bar span {
  font-size: 24px; cursor: pointer; transition: transform 0.2s;
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
}
.react-bar span:hover { transform: scale(1.3); background: var(--surface2); }

.menu-option {
  padding: 13px 18px; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: background 0.15s;
}
.menu-option:hover { background: var(--surface2); }
.menu-option .opt-icon { font-size: 18px; }
.menu-option.danger { color: var(--danger); }
.menu-divider { height: 1px; background: var(--border); }

/* ════════════════════════════════
   MODALES
════════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 4000;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--surface); border-radius: 20px;
  width: 100%; max-width: 340px; overflow: hidden;
}
.modal-header {
  padding: 18px 20px 14px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close { font-size: 22px; cursor: pointer; color: var(--text2); }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

/* Modal de perfil */
#profile-modal .profile-avatar-wrap {
  text-align: center; margin-bottom: 4px;
}
#profile-modal .profile-avatar-big {
  width: 90px; height: 90px; border-radius: 50%; overflow: hidden;
  margin: 0 auto 10px; cursor: pointer; position: relative;
  background: var(--surface2); display: flex; align-items: center;
  justify-content: center; font-size: 36px; font-weight: 700;
}
#profile-modal .profile-avatar-big img { width: 100%; height: 100%; object-fit: cover; }
.profile-change-label { font-size: 13px; color: var(--accent); cursor: pointer; }

/* Temas */
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.theme-option {
  border-radius: 12px; padding: 14px 12px; cursor: pointer;
  display: flex; align-items: center; gap: 10px; font-size: 13px;
  font-weight: 500; border: 2px solid transparent; transition: all 0.2s;
}
.theme-option.active { border-color: var(--accent); }
.theme-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }

/* ════════════════════════════════
   IMAGE VIEWER
════════════════════════════════ */
#img-viewer {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.95); z-index: 5000;
  align-items: center; justify-content: center;
}
#img-viewer.open { display: flex; }
#img-viewer img { max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
#img-viewer-close { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: #fff; }

/* ════════════════════════════════
   EMOJI PICKER
════════════════════════════════ */
#emoji-picker {
  display: none; position: fixed; bottom: 70px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 12px; z-index: 2000;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
  max-width: calc(100vw - 24px);
}
.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
.emoji-grid span {
  font-size: 22px; cursor: pointer; text-align: center; padding: 4px;
  border-radius: 8px; transition: background 0.15s;
}
.emoji-grid span:hover { background: var(--surface2); }

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border);
  padding: 9px 20px; border-radius: 20px; font-size: 13px;
  opacity: 0; transition: opacity 0.3s; z-index: 9000;
  white-space: nowrap; pointer-events: none;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">Direct</div>
  <div class="login-logo-sub">Mensajes Privados</div>

  <div id="avatar-ring-wrap" class="avatar-ring" style="display:none">
    <div class="avatar-ring-inner"><img id="login-avatar-preview" src="" alt=""></div>
  </div>
  <div class="avatar-picker" id="avatar-picker-btn" onclick="document.getElementById('login-avatar-upload').click()">
    <span style="font-size:28px">📷</span>
    <span class="avatar-picker-label">Foto de perfil</span>
  </div>
  <input type="file" id="login-avatar-upload" accept="image/*" style="display:none">

  <input type="text" class="login-input" id="username-field" placeholder="Nombre de usuario" autocomplete="off" maxlength="20">
  <button class="login-btn" onclick="saveUser()">Continuar</button>
</div>

<!-- HEADER -->
<header id="chat-header">
  <span class="back-btn" onclick="logout()">‹</span>
  <div class="header-avatar has-story" id="header-avatar-wrap">
    <div class="avatar-inner" id="header-avatar-inner">
      <img id="header-avatar-img" src="" alt="" style="display:none">
      <span id="header-avatar-letter"></span>
    </div>
  </div>
  <div class="header-info">
    <div class="header-name" id="header-name">Chat Secreto</div>
    <div class="header-status">Activo ahora</div>
  </div>
  <div class="header-actions">
    <span class="header-icon" onclick="openModal('theme-modal')">🎨</span>
    <span class="header-icon" onclick="openModal('profile-modal')">👤</span>
  </div>
</header>

<!-- MENSAJES -->
<div id="messages"></div>

<!-- REPLY PREVIEW -->
<div id="reply-preview">
  <div class="reply-bar"></div>
  <div class="reply-content">
    <div class="reply-name" id="reply-name"></div>
    <div class="reply-text" id="reply-text-preview"></div>
  </div>
  <span class="reply-close" onclick="cancelReply()">✕</span>
</div>

<!-- INPUT BAR -->
<div id="input-bar">
  <button class="input-action-btn" onclick="document.getElementById('photo-upload').click()" title="Foto">📷</button>
  <input type="file" id="photo-upload" accept="image/*" style="display:none">

  <div class="input-wrapper">
    <textarea id="msg-input" placeholder="Mensaje..." rows="1"></textarea>
    <span class="emoji-btn-inner" onclick="toggleEmojiPicker()">😊</span>
    <button id="send-btn" onclick="sendText()">Enviar</button>
  </div>

  <button class="input-action-btn" id="audio-record-btn" title="Audio" onclick="toggleRecording()">🎙️</button>
  <div id="recording-indicator"><span>🔴</span><span id="rec-timer">0:00</span></div>
</div>

<!-- EMOJI PICKER -->
<div id="emoji-picker">
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<!-- CONTEXT MENU -->
<div id="context-menu">
  <div class="react-bar">
    <span onclick="addReaction('❤️')">❤️</span>
    <span onclick="addReaction('😂')">😂</span>
    <span onclick="addReaction('😮')">😮</span>
    <span onclick="addReaction('😢')">😢</span>
    <span onclick="addReaction('🔥')">🔥</span>
    <span onclick="addReaction('👍')">👍</span>
  </div>
  <div class="menu-option" onclick="replyTo()"><span class="opt-icon">↩️</span> Responder</div>
  <div class="menu-option" onclick="copyMsg()"><span class="opt-icon">📋</span> Copiar</div>
  <div class="menu-divider"></div>
  <div class="menu-option danger" onclick="hideForMe()"><span class="opt-icon">🙈</span> Eliminar para mí</div>
  <div class="menu-option danger" id="del-everyone-opt" onclick="deleteEveryone()"><span class="opt-icon">🗑️</span> Eliminar para todos</div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Mi Perfil</h3>
      <span class="modal-close" onclick="closeModal('profile-modal')">✕</span>
    </div>
    <div class="modal-body">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar-big" id="profile-avatar-big" onclick="document.getElementById('profile-avatar-upload').click()">
          <img id="profile-avatar-big-img" src="" alt="" style="display:none">
          <span id="profile-avatar-big-letter"></span>
        </div>
        <div class="profile-change-label" onclick="document.getElementById('profile-avatar-upload').click()">Cambiar foto</div>
        <input type="file" id="profile-avatar-upload" accept="image/*" style="display:none">
      </div>
      <div style="text-align:center; font-size:20px; font-weight:700;" id="profile-display-name"></div>
      <div style="font-size:13px; color:var(--text2); text-align:center">Toca la foto para cambiarla</div>
    </div>

// ══════════════════════════════════════════════

let usersCache = {};

function getAvatar(user) {
  return usersCache[user]?.avatar || "";

function loadMessages() {
  // Cargar avatares
  db.ref("users").on("value", snap => {
    snap.forEach(child => { usersCache[child.key] = child.val(); });
  });

  db.ref("messages").orderByChild("time").startAt(sessionStartTime).on("value", snapshot => {

      const row = document.createElement("div");

      // Avatar izquierda

            av.textContent = data.user.charAt(0).toUpperCase();
          }
          row.appendChild(av);
        } else {

          ph.className = "msg-avatar-placeholder";
          row.appendChild(ph);
        }

      const wrap = document.createElement("div");

      if (!isMe && showAvatar) {
        const nm = document.createElement("div");

        nm.style.display = "block";
        nm.textContent = data.user;
        wrap.appendChild(nm);
      }

      const bubble = document.createElement("div");
      bubble.className = `bubble ${isMe ? "sent" : "received"}`;

      // Reply
      if (data.replyTo) {
        const rDiv = document.createElement("div");
        rDiv.className = "bubble-replied";
        rDiv.innerHTML = `<span class="replied-name">${data.replyTo.user}</span>${data.replyTo.text || "[imagen]"}`;
        bubble.appendChild(rDiv);
      }

      // Contenido
      if (data.type === "image") {
        const img = document.createElement("img");
        img.src = data.url;
        img.className = "msg-image";
        img.onclick = (e) => { e.stopPropagation(); openImgViewer(data.url); };
        bubble.appendChild(img);
      } else if (data.type === "audio") {
        bubble.appendChild(buildAudioPlayer(data, id, isMe));
      } else {
        const span = document.createElement("span");
        span.textContent = data.text;
        bubble.appendChild(span);
      }

      // Estado (solo en mis mensajes)
      if (isMe) {
        const st = document.createElement("span");
        st.className = "msg-status";
        st.textContent = "✓✓";
        bubble.appendChild(st);
      }

      bubble.addEventListener("click", (e) => openMenu(e, id, data, isMe));
      bubble.addEventListener("touchstart", longPressStart(e => openMenu(e, id, data, isMe)), { passive: true });
      bubble.addEventListener("touchend", longPressEnd);

      wrap.appendChild(bubble);

      // Reacciones
      if (data.reactions) {
        const rRow = document.createElement("div");
        rRow.className = "reaction-row";
        Object.keys(data.reactions).forEach(emoji => {
          const chip = document.createElement("div");
          chip.className = "react-chip";
          chip.innerHTML = `${emoji}`;
          chip.onclick = (e) => { e.stopPropagation(); addReactionDirect(id, emoji); };
          rRow.appendChild(chip);
        });
        wrap.appendChild(rRow);
      }

      row.appendChild(wrap);
      container.appendChild(row);
      prevUser = data.user;
    });

    container.scrollTop = container.scrollHeight;
  });
}

// ══════════════════════════════════════════════
// AUDIO PLAYER
// ══════════════════════════════════════════════
function buildAudioPlayer(data, id, isMe) {
  const wrap = document.createElement("div");
  wrap.className = "audio-player";

  const btn = document.createElement("button");
  btn.className = "audio-play-btn";
  btn.innerHTML = "▶";

  const waveform = document.createElement("div");
  waveform.className = "audio-waveform";
  const bars = data.waveform || Array.from({length:20}, () => Math.random());
  const maxH = Math.max(...bars);
  bars.forEach((v, i) => {
    const bar = document.createElement("div");
    bar.className = "wave-bar";
    bar.style.height = Math.max(6, (v / maxH) * 28) + "px";
    bar.id = `wbar-${id}-${i}`;
    waveform.appendChild(bar);
  });

  const dur = document.createElement("div");
  dur.className = "audio-duration";
  const totalSec = data.duration || 0;
  dur.textContent = formatDur(totalSec);

  const audio = new Audio(data.url);
  audioElements[id] = audio;

  let playing = false;
  let rafId = null;

  audio.onended = () => {
    playing = false;
    btn.innerHTML = "▶";
    dur.textContent = formatDur(totalSec);
    waveform.querySelectorAll(".wave-bar").forEach(b => b.classList.remove("played"));
    cancelAnimationFrame(rafId);
  };

  function updateWave() {
    if (!playing) return;
    const prog = audio.currentTime / audio.duration;
    const barCount = bars.length;
    const filled = Math.floor(prog * barCount);
    waveform.querySelectorAll(".wave-bar").forEach((b, i) => {
      b.classList.toggle("played", i < filled);
    });
    dur.textContent = formatDur(audio.currentTime);
    rafId = requestAnimationFrame(updateWave);
  }

  btn.onclick = (e) => {
    e.stopPropagation();
    // Pause others
    Object.keys(audioElements).forEach(k => {
      if (k !== id && !audioElements[k].paused) { audioElements[k].pause(); }
    });
    if (playing) { audio.pause(); playing = false; btn.innerHTML = "▶"; cancelAnimationFrame(rafId); }
    else { audio.play(); playing = true; btn.innerHTML = "⏸"; updateWave(); }
  };

  waveform.onclick = (e) => {
    e.stopPropagation();
    const rect = waveform.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
  };

  wrap.appendChild(btn);
  wrap.appendChild(waveform);
  wrap.appendChild(dur);
  return wrap;
}

function formatDur(s) {
  s = Math.floor(s);
  return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
}

// ══════════════════════════════════════════════
// AUDIO RECORDING
// ══════════════════════════════════════════════
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const chunks = [];
    const waveformData = [];

    // Analyze for waveform
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    const waveInterval = setInterval(() => {
      analyser.getByteFrequencyData(dataArray);
      const avg = dataArray.slice(0,16).reduce((a,b)=>a+b,0)/16;
      waveformData.push(avg);
    }, 200);

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
      clearInterval(waveInterval);
      stream.getTracks().forEach(t => t.stop());
      audioCtx.close();
      const blob = new Blob(chunks, { type: "audio/webm" });
      const duration = recSeconds;
      showToast("Enviando audio...");
      const ref = storage.ref("audios/" + Date.now() + ".webm");
      await ref.put(blob);
      const url = await ref.getDownloadURL();
      db.ref("messages").push({
        user: currentUser, url, time: Date.now(), type: "audio",
        duration, waveform: waveformData.slice(0, 30)
      });
    };

    mediaRecorder.start();
    isRecording = true;
    recSeconds = 0;
    document.getElementById("audio-record-btn").classList.add("recording");
    document.getElementById("audio-record-btn").textContent = "⏹";
    document.getElementById("recording-indicator").style.display = "flex";
    recTimerInterval = setInterval(() => {
      recSeconds++;
      document.getElementById("rec-timer").textContent = formatDur(recSeconds);
    }, 1000);
  } catch(err) {
    showToast("No se pudo acceder al micrófono");
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    clearInterval(recTimerInterval);
    document.getElementById("audio-record-btn").classList.remove("recording");
    document.getElementById("audio-record-btn").textContent = "🎙️";
    document.getElementById("recording-indicator").style.display = "none";
  }
}

let longPressTimer = null;

function longPressStart(cb) {
  return function(e) {
    longPressTimer = setTimeout(() => cb(e.touches[0]), 500);
  };
}
function longPressEnd() {
  clearTimeout(longPressTimer);
}

function openMenu(e, id, data, isMine) {
  e.stopPropagation();
  selectedMsgId = id;
  selectedMsgData = data;
  isMyMsg = isMine;
  const menu = document.getElementById("context-menu");
  menu.style.display = "block";
  const x = e.pageX || (e.clientX);
  const y = e.pageY || (e.clientY);
  menu.style.left = Math.min(x, window.innerWidth - 230) + "px";
  menu.style.top = Math.min(y - 10, window.innerHeight - 220) + "px";
  document.getElementById("del-everyone-opt").style.display = isMine ? "flex" : "none";
}

function addReaction(emoji) {
  if (!selectedMsgId) return;
  db.ref("messages/" + selectedMsgId + "/reactions/" + emoji).set(true);
  closeMenu();
}

function addReactionDirect(id, emoji) {
  db.ref("messages/" + id + "/reactions/" + emoji).transaction(v => v ? null : true);
}

function replyTo() {
  if (!selectedMsgData) return;
  replyingTo = {
    user: selectedMsgData.user,
    text: selectedMsgData.text || "[imagen]"
  };
  document.getElementById("reply-name").textContent = selectedMsgData.user;
  document.getElementById("reply-text-preview").textContent = selectedMsgData.text || "[imagen]";
  document.getElementById("reply-preview").style.display = "flex";
  document.getElementById("msg-input").focus();
  closeMenu();
}

function cancelReply() {
  replyingTo = null;
  document.getElementById("reply-preview").style.display = "none";
}

function copyMsg() {
  if (selectedMsgData?.text) {
    navigator.clipboard?.writeText(selectedMsgData.text).then(() => showToast("Copiado ✓"));
  }
  closeMenu();
}

function hideForMe() {
  hiddenList.push(selectedMsgId);
  localStorage.setItem("tk_hidden", JSON.stringify(hiddenList));
  closeMenu();
}

function deleteEveryone() {
  db.ref("messages/" + selectedMsgId).remove();
  closeMenu();
}

function closeMenu() {
  document.getElementById("context-menu").style.display = "none";
  selectedMsgId = null;
}
