<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat 💗</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* LOGIN */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .login-card {
            background: #111;
            border: 0.5px solid #333;
            padding: 36px 28px;
            border-radius: 20px;
            text-align: center;
            width: 88%;
            max-width: 360px;
        }

        .login-card h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .login-card p {
            font-size: 13px;
            color: #666;
            margin-bottom: 24px;
        }

        .login-card input {
            width: 100%;
            background: #1c1c1c;
            border: 0.5px solid #444;
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
        }

        .login-card input:focus { border-color: #ff0050; }

        .login-card button {
            width: 100%;
            background: #ff0050;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* TOPBAR */
        #topbar {
            padding: 14px 16px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid #1a1a1a;
            background: #0a0a0a;
            flex-shrink: 0;
        }

        #topbar .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0050, #ff75a0);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: white;
            flex-shrink: 0;
        }

        #topbar .info { flex: 1; }
        #topbar .chat-name { font-size: 15px; font-weight: 600; color: #fff; }
        #topbar .online { font-size: 12px; color: #555; display: flex; align-items: center; gap: 4px; }
        #topbar .dot { width: 7px; height: 7px; background: #25d366; border-radius: 50%; }

        /* MENSAJES */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #0a0a0a;
        }

        #messages::-webkit-scrollbar { width: 0; }

        .bubble {
            max-width: 78%;
            padding: 9px 13px 7px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.45;
            color: #eee;
            word-break: break-word;
        }

        .sent {
            align-self: flex-end;
            background: #ff0050;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received {
            align-self: flex-start;
            background: #1e1e1e;
            border-bottom-left-radius: 4px;
        }

        .name-tag {
            font-size: 11px;
            font-weight: 700;
            color: #ff75a0;
            margin-bottom: 2px;
        }

        .time-tag {
            font-size: 10px;
            color: rgba(255,255,255,0.45);
            margin-top: 3px;
            text-align: right;
        }

        .time-tag.left { text-align: left; color: #444; }

        .day-divider {
            text-align: center;
            font-size: 11px;
            color: #444;
            margin: 8px 0;
        }

        /* INPUT */
        #input-area {
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            background: #0a0a0a;
            border-top: 0.5px solid #1a1a1a;
            flex-shrink: 0;
        }

        #msg-input {
            flex: 1;
            background: #1c1c1c;
            border: 0.5px solid #2a2a2a;
            border-radius: 24px;
            padding: 10px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        #msg-input:focus { border-color: #ff0050; }
        #msg-input::placeholder { color: #555; }

        #send-btn {
            width: 40px; height: 40px;
            background: #ff0050;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        #send-btn:active { background: #cc0040; }

        #send-btn svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h1>¿Cómo te llamas? 💗</h1>
        <p>Solo se te preguntará una vez</p>
        <input type="text" id="username-input" placeholder="Tu nombre..." autocomplete="off" maxlength="20">
        <button onclick="joinChat()">Entrar al chat</button>
    </div>
</div>

<div id="topbar" style="display:none">
    <div class="avatar" id="topbar-avatar">?</div>
    <div class="info">
        <div class="chat-name">Chat secreto 💗</div>
        <div class="online"><div class="dot"></div> En línea</div>
    </div>
    <span id="topbar-me" style="font-size:13px;color:#555"></span>
</div>

<div id="messages" style="display:none"></div>

<div id="input-area" style="display:none">
    <input type="text" id="msg-input" placeholder="Mensaje..." autocomplete="off">
    <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
</div>

<script>
    // ──────────────────────────────────────────────
    // CONFIGURA TU FIREBASE AQUÍ
    // ──────────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
        projectId: "TU_PROYECTO",
    };
    // ──────────────────────────────────────────────

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = localStorage.getItem("chatName") || "";

    function joinChat() {
        const val = document.getElementById('username-input').value.trim();
        if (!val) return;
        myName = val;
        localStorage.setItem("chatName", myName);
        startChat();
    }

    function startChat() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('topbar').style.display = 'flex';
        document.getElementById('messages').style.display = 'flex';
        document.getElementById('input-area').style.display = 'flex';

        const initial = myName.charAt(0).toUpperCase();
        document.getElementById('topbar-avatar').textContent = initial;
        document.getElementById('topbar-me').textContent = myName;

        loadMessages();
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = "";

        db.ref('messages').push({
            user: myName,
            text: text,
            time: Date.now()
        });
    }

    let lastDate = "";

    function loadMessages() {
        db.ref('messages').limitToLast(100).on('value', (snapshot) => {
            const container = document.getElementById('messages');
            container.innerHTML = "";
            lastDate = "";

            snapshot.forEach((child) => {
                const d = child.val();
                const isMe = d.user === myName;

                const msgDate = new Date(d.time).toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
                if (msgDate !== lastDate) {
                    lastDate = msgDate;
                    const div = document.createElement('div');
                    div.className = 'day-divider';
                    div.textContent = msgDate;
                    container.appendChild(div);
                }

                const bubble = document.createElement('div');
                bubble.className = `bubble ${isMe ? 'sent' : 'received'}`;

                const timeStr = new Date(d.time).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

                bubble.innerHTML = isMe
                    ? `${escHtml(d.text)}<div class="time-tag">${timeStr}</div>`
                    : `<div class="name-tag">${escHtml(d.user)}</div>${escHtml(d.text)}<div class="time-tag left">${timeStr}</div>`;

                container.appendChild(bubble);
            });

            container.scrollTop = container.scrollHeight;
        });
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (myName) {
            startChat();
        }

        document.getElementById('msg-input')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('username-input')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinChat();
        });
    });
</script>
</body>
</html>
