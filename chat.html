<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat рЯТЧ</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* вФАвФА LOGIN вФАвФА */
        #login-screen {
            position: fixed; inset: 0;
            background: #080808;
            display: flex; justify-content: center; align-items: center;
            z-index: 200;
            flex-direction: column;
            gap: 0;
        }

        .login-logo {
            font-size: 38px;
            margin-bottom: 28px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

        .login-card {
            background: #111;
            border: 0.5px solid #2a2a2a;
            padding: 32px 26px;
            border-radius: 24px;
            text-align: center;
            width: 88%; max-width: 340px;
        }

        .login-card h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .login-card p  { font-size: 12px; color: #555; margin-bottom: 22px; }

        .avatar-picker {
            display: flex; justify-content: center; margin-bottom: 18px;
        }

        .avatar-ring {
            width: 72px; height: 72px; border-radius: 50%;
            border: 2px dashed #444;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; position: relative;
            transition: border-color .2s;
        }

        .avatar-ring:hover { border-color: #ff0050; }
        .avatar-ring img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar-ring .plus { font-size: 24px; color: #555; pointer-events: none; }
        #avatar-file { display: none; }

        .login-card input[type=text] {
            width: 100%; background: #1a1a1a; border: 0.5px solid #333;
            border-radius: 12px; padding: 13px 15px; color: #fff;
            font-size: 15px; outline: none; margin-bottom: 14px;
        }

        .login-card input[type=text]:focus { border-color: #ff0050; }

        .login-card button {
            width: 100%; background: #ff0050; color: #fff;
            border: none; padding: 14px; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        #login-loading { display: none; font-size: 13px; color: #555; margin-top: 12px; }

        /* вФАвФА TOPBAR вФАвФА */
        #topbar {
            padding: 12px 14px 10px;
            display: none; align-items: center; gap: 10px;
            border-bottom: 0.5px solid #1a1a1a;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            flex-shrink: 0; z-index: 10;
        }

        .tb-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #ff0050, #ff75a0);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: white;
            flex-shrink: 0; overflow: hidden; cursor: pointer;
        }

        .tb-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .tb-info { flex: 1; }
        .tb-name { font-size: 15px; font-weight: 600; color: #fff; }
        .tb-status { font-size: 11px; color: #555; display: flex; align-items: center; gap: 4px; }
        .tb-dot { width: 6px; height: 6px; background: #25d366; border-radius: 50%; }

        .tb-logout {
            font-size: 11px; color: #444; cursor: pointer; padding: 4px 8px;
            border: 0.5px solid #2a2a2a; border-radius: 8px;
        }

        .tb-logout:hover { color: #ff0050; border-color: #ff0050; }

        /* вФАвФА MENSAJES вФАвФА */
        #messages {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 12px 10px 6px;
            display: none; flex-direction: column; gap: 4px;
            background: #0a0a0a;
        }

        #messages::-webkit-scrollbar { width: 0; }

        .bubble {
            max-width: 78%; padding: 9px 13px 6px;
            border-radius: 18px; font-size: 14px; line-height: 1.45;
            color: #eee; word-break: break-word;
            animation: msgIn .2s ease;
        }

        @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

        .sent   { align-self: flex-end;  background: #ff0050; color: #fff; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #1e1e1e; border-bottom-left-radius: 4px; }

        .name-tag { font-size: 11px; font-weight: 700; color: #ff75a0; margin-bottom: 2px; }

        .time-tag { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 3px; text-align: right; }
        .time-tag.left { text-align: left; color: #3a3a3a; }

        .day-divider { text-align: center; font-size: 11px; color: #333; margin: 10px 0 4px; }

        /* Im√°genes en burbujas */
        .bubble-img {
            max-width: 220px; border-radius: 12px; display: block;
            cursor: pointer; margin-bottom: 4px;
        }

        /* Audio en burbujas */
        .audio-bubble {
            display: flex; align-items: center; gap: 10px;
            min-width: 180px; padding: 4px 0;
        }

        .play-btn {
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; border: none;
            transition: background .15s;
        }

        .play-btn:hover { background: rgba(255,255,255,0.25); }
        .play-btn svg { fill: white; width: 14px; height: 14px; }

        .audio-waves {
            flex: 1; height: 28px; display: flex; align-items: center; gap: 2px;
        }

        .wave-bar {
            width: 3px; border-radius: 2px;
            background: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }

        .audio-dur { font-size: 11px; color: rgba(255,255,255,0.5); flex-shrink: 0; }

        /* вФАвФА INPUT AREA вФАвФА */
        #input-area {
            padding: 8px 10px;
            display: none; gap: 8px; align-items: flex-end;
            background: #0a0a0a; border-top: 0.5px solid #181818;
            flex-shrink: 0;
        }

        .extra-btns { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }

        .icon-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: #1a1a1a; border: 0.5px solid #2a2a2a;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: background .15s;
        }

        .icon-btn:hover { background: #252525; }
        .icon-btn svg { width: 17px; height: 17px; fill: #888; }
        .icon-btn.active svg { fill: #ff0050; }

        #msg-input {
            flex: 1; background: #1c1c1c; border: 0.5px solid #2a2a2a;
            border-radius: 22px; padding: 9px 15px; color: #fff;
            font-size: 14px; outline: none; resize: none; max-height: 100px;
            line-height: 1.4; overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #msg-input:focus { border-color: #333; }
        #msg-input::placeholder { color: #444; }

        #send-btn {
            width: 38px; height: 38px; background: #ff0050;
            border: none; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background .15s, transform .1s;
        }

        #send-btn:active { background: #cc0040; transform: scale(0.93); }
        #send-btn svg { width: 17px; height: 17px; fill: white; }

        /* Grabaci√≥n de audio */
        #rec-indicator {
            display: none; align-items: center; gap: 8px;
            padding: 8px 14px; background: #1a0a0a;
            border-top: 0.5px solid #2a1a1a; flex-shrink: 0;
        }

        .rec-dot { width: 10px; height: 10px; background: #ff0050; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        #rec-time { font-size: 13px; color: #ff4444; font-variant-numeric: tabular-nums; }
        #rec-cancel { font-size: 12px; color: #555; cursor: pointer; margin-left: auto; }
        #rec-cancel:hover { color: #ff0050; }

        /* Selector de emoji */
        #emoji-panel {
            display: none; padding: 10px 12px; background: #0f0f0f;
            border-top: 0.5px solid #1a1a1a; flex-wrap: wrap; gap: 6px;
            max-height: 160px; overflow-y: auto; flex-shrink: 0;
        }

        #emoji-panel span {
            font-size: 22px; cursor: pointer; line-height: 1;
            transition: transform .1s;
        }

        #emoji-panel span:hover { transform: scale(1.25); }

        /* Preview de imagen */
        #img-preview-bar {
            display: none; padding: 8px 12px; background: #0f0f0f;
            border-top: 0.5px solid #1a1a1a; align-items: center; gap: 10px;
            flex-shrink: 0;
        }

        #img-preview-bar img { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; }
        #img-preview-bar .cancel-img { color: #555; cursor: pointer; font-size: 20px; margin-left: auto; }
        #img-preview-bar .cancel-img:hover { color: #ff0050; }
        #img-preview-label { font-size: 12px; color: #555; }

        /* Lightbox */
        #lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 300;
            justify-content: center; align-items: center;
        }

        #lightbox img { max-width: 95%; max-height: 90dvh; border-radius: 12px; }
        #lightbox-close { position: absolute; top: 18px; right: 18px; color: #fff; font-size: 28px; cursor: pointer; }

        /* Archivos ocultos */
        #photo-file, #avatar-file-chat { display: none; }

        /* toast */
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #222; color: #fff; font-size: 13px; padding: 8px 18px;
            border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 400;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-logo">рЯТЧ</div>
    <div class="login-card">
        <h1>Bienvenida</h1>
        <p>Elige tu foto y tu nombre</p>
        <div class="avatar-picker">
            <div class="avatar-ring" onclick="document.getElementById('avatar-file').click()">
                <img id="avatar-preview" alt="">
                <span class="plus" id="avatar-plus">+</span>
            </div>
            <input type="file" id="avatar-file" accept="image/*">
        </div>
        <input type="text" id="username-input" placeholder="Tu nombre..." autocomplete="off" maxlength="20">
        <button onclick="joinChat()">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
            Entrar al chat
        </button>
        <div id="login-loading">Subiendo foto...</div>
    </div>
</div>

<!-- TOPBAR -->
<div id="topbar">
    <div class="tb-avatar" id="tb-avatar" onclick="document.getElementById('avatar-file-chat').click()">?</div>
    <input type="file" id="avatar-file-chat" accept="image/*">
    <div class="tb-info">
        <div class="tb-name">Chat secreto рЯТЧ</div>
        <div class="tb-status"><div class="tb-dot"></div> En l√≠nea</div>
    </div>
    <span class="tb-logout" onclick="logout()">Salir</span>
</div>

<!-- MENSAJES -->
<div id="messages"></div>

<!-- GRABACI√УN -->
<div id="rec-indicator">
    <div class="rec-dot"></div>
    <span id="rec-time">0:00</span>
    <span id="rec-cancel" onclick="cancelRec()">вЬХ Cancelar</span>
</div>

<!-- PREVIEW IMAGEN -->
<div id="img-preview-bar">
    <img id="img-preview-thumb" alt="">
    <span id="img-preview-label">Lista para enviar</span>
    <span class="cancel-img" onclick="cancelImg()">вЬХ</span>
</div>

<!-- PANEL EMOJI -->
<div id="emoji-panel"></div>

<!-- INPUT -->
<div id="input-area">
    <div class="extra-btns">
        <!-- Emoji -->
        <div class="icon-btn" id="emoji-btn" onclick="toggleEmoji()">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
        </div>
        <!-- Foto -->
        <div class="icon-btn" onclick="document.getElementById('photo-file').click()">
            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        </div>
        <input type="file" id="photo-file" accept="image/*">
        <!-- Audio -->
        <div class="icon-btn" id="mic-btn" onclick="toggleRec()">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
        </div>
    </div>

    <textarea id="msg-input" placeholder="Mensaje..." rows="1" autocomplete="off"></textarea>

    <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close">вЬХ</span>
    <img id="lightbox-img" alt="">
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА FIREBASE CONFIG вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const firebaseConfig = {
  apiKey: "AIzaSyCY2qGZrlJ9Fa3JbAkKoWiVL5Jz5YBKT4c",
  authDomain: "chatsecrect-90b82.firebaseapp.com",
  databaseURL: "https://chatsecrect-90b82-default-rtdb.firebaseio.com/",
  projectId: "chatsecrect-90b82",
  storageBucket: "chatsecrect-90b82.firebasestorage.app",
  messagingSenderId: "111901784465",
  appId: "1:111901784465:web:161b363c5991f56daf8230",
  measurementId: "G-7B2N9MR1QR"
};
// вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА

firebase.initializeApp(firebaseConfig);
const db      = firebase.database();
const storage = firebase.storage();

let myName   = localStorage.getItem("chatName")  || "";
let myAvatar = localStorage.getItem("chatAvatar") || "";

// вФАвФА AVATAR SELECTOR EN LOGIN вФАвФА
const avatarFile    = document.getElementById('avatar-file');
const avatarPreview = document.getElementById('avatar-preview');
let   pendingAvatarFile = null;

avatarFile.addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    pendingAvatarFile = f;
    const reader = new FileReader();
    reader.onload = ev => {
        avatarPreview.src = ev.target.result;
        avatarPreview.style.display = 'block';
        document.getElementById('avatar-plus').style.display = 'none';
    };
    reader.readAsDataURL(f);
});

async function joinChat() {
    const val = document.getElementById('username-input').value.trim();
    if (!val) { showToast("Escribe tu nombre"); return; }
    myName = val;

    if (pendingAvatarFile) {
        document.getElementById('login-loading').style.display = 'block';
        try {
            const url = await uploadFile(pendingAvatarFile, 'avatars/' + myName + '_' + Date.now());
            myAvatar = url;
        } catch(e) { console.warn("Avatar upload failed", e); }
        document.getElementById('login-loading').style.display = 'none';
    }

    localStorage.setItem("chatName",   myName);
    localStorage.setItem("chatAvatar", myAvatar);
    startChat();
}

// вФАвФА AVATAR CAMBIAR DESDE TOPBAR вФАвФА
document.getElementById('avatar-file-chat').addEventListener('change', async e => {
    const f = e.target.files[0];
    if (!f) return;
    showToast("Subiendo foto de perfil...");
    try {
        const url = await uploadFile(f, 'avatars/' + myName + '_' + Date.now());
        myAvatar = url;
        localStorage.setItem("chatAvatar", myAvatar);
        renderTbAvatar();
        showToast("Foto actualizada вЬУ");
    } catch(err) { showToast("Error al subir foto"); }
});

function renderTbAvatar() {
    const el = document.getElementById('tb-avatar');
    if (myAvatar) {
        el.innerHTML = `<img src="${myAvatar}" alt="">`;
    } else {
        el.textContent = myName.charAt(0).toUpperCase();
    }
}

function startChat() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('topbar').style.display = 'flex';
    document.getElementById('messages').style.display = 'flex';
    document.getElementById('input-area').style.display = 'flex';
    renderTbAvatar();
    loadMessages();
}

function logout() {
    if (!confirm("¬њSalir del chat? Tendr√°s que poner tu nombre de nuevo.")) return;
    localStorage.removeItem("chatName");
    localStorage.removeItem("chatAvatar");
    location.reload();
}

// вФАвФА MENSAJES вФАвФА
function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = "";
    input.style.height = 'auto';
    db.ref('messages').push({ type:'text', user:myName, avatar:myAvatar, text, time:Date.now() });
}

// вФАвФА FOTO вФАвФА
const photoFile = document.getElementById('photo-file');
let   pendingPhoto = null;

photoFile.addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    pendingPhoto = f;
    const reader = new FileReader();
    reader.onload = ev => {
        document.getElementById('img-preview-thumb').src = ev.target.result;
        document.getElementById('img-preview-bar').style.display = 'flex';
    };
    reader.readAsDataURL(f);
    e.target.value = "";
});

document.getElementById('send-btn').addEventListener('click', async () => {
    if (pendingPhoto) { await sendPhoto(); return; }
    if (isRecording)  { await stopRec();  return; }
    sendMessage();
}, true); // capture phase so it runs before onclick

async function sendPhoto() {
    if (!pendingPhoto) return;
    showToast("Enviando imagen...");
    cancelImg();
    try {
        const url = await uploadFile(pendingPhoto, 'photos/' + Date.now() + '_' + pendingPhoto.name);
        db.ref('messages').push({ type:'image', user:myName, avatar:myAvatar, url, time:Date.now() });
    } catch(e) { showToast("Error al enviar imagen"); }
    pendingPhoto = null;
}

function cancelImg() {
    pendingPhoto = null;
    document.getElementById('img-preview-bar').style.display = 'none';
    document.getElementById('img-preview-thumb').src = '';
}

// вФАвФА AUDIO вФАвФА
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let recTimerInt   = null;
let recSeconds    = 0;

async function toggleRec() {
    if (isRecording) { await stopRec(); return; }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        isRecording = true;
        recSeconds  = 0;
        document.getElementById('mic-btn').classList.add('active');
        document.getElementById('rec-indicator').style.display = 'flex';
        recTimerInt = setInterval(() => {
            recSeconds++;
            const m = Math.floor(recSeconds/60);
            const s = String(recSeconds%60).padStart(2,'0');
            document.getElementById('rec-time').textContent = `${m}:${s}`;
        }, 1000);
    } catch(e) { showToast("No se pudo acceder al micr√≥fono"); }
}

async function stopRec() {
    if (!mediaRecorder) return;
    return new Promise(resolve => {
        mediaRecorder.onstop = async () => {
            clearInterval(recTimerInt);
            document.getElementById('rec-indicator').style.display = 'none';
            document.getElementById('mic-btn').classList.remove('active');
            isRecording = false;
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const dur  = recSeconds;
            showToast("Enviando audio...");
            try {
                const url = await uploadFile(blob, 'audios/' + Date.now() + '.webm');
                db.ref('messages').push({ type:'audio', user:myName, avatar:myAvatar, url, dur, time:Date.now() });
            } catch(e) { showToast("Error al enviar audio"); }
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            mediaRecorder = null;
            resolve();
        };
        mediaRecorder.stop();
    });
}

function cancelRec() {
    if (!mediaRecorder) return;
    clearInterval(recTimerInt);
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    mediaRecorder = null;
    isRecording = false;
    audioChunks = [];
    document.getElementById('rec-indicator').style.display = 'none';
    document.getElementById('mic-btn').classList.remove('active');
}

// вФАвФА EMOJI вФАвФА
const EMOJIS = ['рЯША','рЯШВ','рЯ•∞','рЯШН','рЯ§©','рЯШШ','рЯШО','рЯ•≥','рЯШ≠','рЯШ§','рЯ§Ф','рЯ•Ї','рЯШИ','рЯФ•','рЯТѓ','рЯСА','рЯТЧ','рЯТХ','рЯТЦ','вЬ®','рЯМЄ','рЯОЙ','рЯСП','рЯЩМ','рЯТ™','рЯ§Э','рЯСЛ','вЭ§пЄП','рЯТА','рЯШЕ','рЯЂґ','рЯ•є','рЯШП','рЯШМ','рЯ§≠','рЯШі','рЯ§ѓ','рЯШ°','рЯЂ†','рЯ•≤'];

function buildEmojiPanel() {
    const panel = document.getElementById('emoji-panel');
    EMOJIS.forEach(em => {
        const span = document.createElement('span');
        span.textContent = em;
        span.addEventListener('click', () => {
            const input = document.getElementById('msg-input');
            const pos = input.selectionStart ?? input.value.length;
            input.value = input.value.slice(0, pos) + em + input.value.slice(pos);
            input.focus();
        });
        panel.appendChild(span);
    });
}

function toggleEmoji() {
    const panel = document.getElementById('emoji-panel');
    const btn   = document.getElementById('emoji-btn');
    const open  = panel.style.display === 'flex';
    panel.style.display = open ? 'none' : 'flex';
    btn.classList.toggle('active', !open);
}

// вФАвФА CARGAR MENSAJES вФАвФА
let lastDate = "";

function loadMessages() {
    db.ref('messages').limitToLast(100).on('value', snapshot => {
        const container = document.getElementById('messages');
        container.innerHTML = "";
        lastDate = "";

        snapshot.forEach(child => {
            const d    = child.val();
            const isMe = d.user === myName;

            const msgDate = new Date(d.time).toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'short' });
            if (msgDate !== lastDate) {
                lastDate = msgDate;
                const div = document.createElement('div');
                div.className = 'day-divider';
                div.textContent = msgDate;
                container.appendChild(div);
            }

            const timeStr = new Date(d.time).toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
            const bubble  = document.createElement('div');
            bubble.className = `bubble ${isMe ? 'sent' : 'received'}`;

            let inner = isMe ? '' : `<div class="name-tag">${esc(d.user)}</div>`;

            if (d.type === 'text' || !d.type) {
                inner += esc(d.text);
            } else if (d.type === 'image') {
                inner += `<img class="bubble-img" src="${esc(d.url)}" alt="foto" onclick="openLightbox('${esc(d.url)}')">`;
            } else if (d.type === 'audio') {
                const dur = d.dur || 0;
                const wavesBars = Array.from({length:20}, (_,i) => {
                    const h = 6 + Math.floor(Math.abs(Math.sin(i*0.8))*16);
                    return `<div class="wave-bar" style="height:${h}px"></div>`;
                }).join('');
                inner += `<div class="audio-bubble">
                    <button class="play-btn" onclick="playAudio(this, '${esc(d.url)}')">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <div class="audio-waves">${wavesBars}</div>
                    <span class="audio-dur">${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}</span>
                </div>`;
            }

            inner += `<div class="time-tag ${isMe?'':'left'}">${timeStr}</div>`;
            bubble.innerHTML = inner;
            container.appendChild(bubble);
        });

        container.scrollTop = container.scrollHeight;
    });
}

// вФАвФА REPRODUCIR AUDIO вФАвФА
let currentAudio = null;

function playAudio(btn, url) {
    if (currentAudio && !currentAudio.paused) {
        currentAudio.pause();
        currentAudio = null;
        document.querySelectorAll('.play-btn svg').forEach(s => s.innerHTML = '<path d="M8 5v14l11-7z"/>');
        return;
    }
    currentAudio = new Audio(url);
    btn.querySelector('svg').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    currentAudio.onended = () => {
        btn.querySelector('svg').innerHTML = '<path d="M8 5v14l11-7z"/>';
    };
    currentAudio.play();
}

// вФАвФА LIGHTBOX вФАвФА
function openLightbox(url) {
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
}

// вФАвФА UPLOAD a Firebase Storage вФАвФА
function uploadFile(file, path) {
    return new Promise((resolve, reject) => {
        const ref  = storage.ref(path);
        const task = ref.put(file);
        task.on('state_changed', null, reject, async () => {
            const url = await ref.getDownloadURL();
            resolve(url);
        });
    });
}

// вФАвФА HELPERS вФАвФА
function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.style.opacity = '0', 2400);
}

// вФАвФА TEXTAREA auto-resize вФАвФА
document.addEventListener('DOMContentLoaded', () => {
    buildEmojiPanel();

    if (myName) startChat();

    const msgInput = document.getElementById('msg-input');
    msgInput.addEventListener('input', () => {
        msgInput.style.height = 'auto';
        msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
    });
    msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    document.getElementById('username-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') joinChat();
    });
});
</script>
