<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat online</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── PANTALLA DE LOGIN ── */
        #login-screen {
            position: fixed; inset: 0;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .login-logo { font-size: 60px; margin-bottom: 20px; }
        
        .login-card {
            width: 85%; max-width: 350px; text-align: center;
        }

        .login-card h1 { font-size: 24px; margin-bottom: 10px; }
        
        .login-card input {
            width: 100%; background: #222; border: 1px solid #333;
            padding: 15px; border-radius: 10px; color: #fff;
            font-size: 16px; outline: none; margin-bottom: 20px;
        }

        .login-card button {
            width: 100%; background: #fe2c55; color: #fff;
            border: none; padding: 15px; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }

        /* ── HEADER TIKTOK ── */
        header {
            display: none; align-items: center; padding: 10px 15px;
            border-bottom: 1px solid #1a1a1a; background: #000;
            z-index: 100;
        }

        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; }
        
        .user-info { display: flex; align-items: center; flex: 1; }
        
        .user-avatar {
            width: 35px; height: 35px; border-radius: 50%;
            background: #333; margin-right: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; overflow: hidden;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-details h2 { font-size: 15px; font-weight: 600; }
        .user-details p { font-size: 11px; color: #25d366; }

        /* ── AREA DE MENSAJES ── */
        #messages {
            flex: 1; overflow-y: auto; padding: 15px;
            display: none; flex-direction: column; gap: 15px;
            background: #000;
        }

        .message-row { display: flex; width: 100%; position: relative; }
        .row-sent { justify-content: flex-end; }
        .row-received { justify-content: flex-start; }

        .bubble {
            max-width: 75%; padding: 10px 14px; font-size: 15px;
            line-height: 1.4; position: relative; cursor: pointer;
        }

        .sent {
            background: linear-gradient(135deg, #00f2ea 0%, #fe2c55 100%);
            color: #fff; border-radius: 18px 18px 2px 18px;
        }

        .received {
            background: #262626; color: #fff;
            border-radius: 18px 18px 18px 2px;
        }

        .msg-user-name { font-size: 10px; color: #777; margin-bottom: 4px; display: block; }

        /* Reacciones debajo del mensaje */
        .reaction-container {
            position: absolute; bottom: -12px; display: flex; gap: 2px;
        }
        .row-sent .reaction-container { right: 5px; }
        .row-received .reaction-container { left: 5px; }

        .reaction-badge {
            background: #1a1a1a; border: 1px solid #333;
            border-radius: 10px; padding: 2px 5px; font-size: 10px;
        }

        /* ── MENU DE ACCIONES ── */
        #context-menu {
            display: none; position: fixed; background: #222;
            border: 1px solid #333; border-radius: 12px;
            width: 200px; z-index: 2000; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .react-bar {
            display: flex; justify-content: space-around; padding: 10px;
            border-bottom: 1px solid #333; font-size: 20px;
        }
        .react-bar span { cursor: pointer; transition: transform 0.2s; }
        .react-bar span:hover { transform: scale(1.3); }

        .menu-option {
            padding: 12px 15px; font-size: 14px; cursor: pointer;
        }
        .menu-option:hover { background: #333; }
        .menu-option.delete { color: #fe2c55; }

        /* ── BARRA DE ENTRADA ── */
        #input-bar {
            display: none; align-items: center; padding: 10px 15px;
            background: #000; border-top: 1px solid #1a1a1a; gap: 10px;
        }

        .input-wrapper {
            flex: 1; background: #1a1a1a; border-radius: 20px;
            padding: 8px 15px; display: flex; align-items: center;
        }

        #msg-input {
            flex: 1; background: transparent; border: none;
            color: #fff; outline: none; font-size: 15px;
            max-height: 80px; resize: none;
        }

        .action-icon { font-size: 22px; color: #888; cursor: pointer; }
        #send-btn { color: #fe2c55; font-weight: bold; cursor: pointer; display: none; }

        /* Toast */
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #333; padding: 8px 20px; border-radius: 20px;
            font-size: 13px; opacity: 0; transition: 0.3s; z-index: 5000;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen">
        <div class="login-logo">💗</div>
        <div class="login-card">
            <h1>Bienvenida</h1>
            <p style="color: #666; margin-bottom: 20px;">Tu historial se borrará cada vez que entres como nueva.</p>
            <input type="text" id="username-field" placeholder="Nombre de usuario" autocomplete="off">
            <button onclick="saveUser()">Empezar</button>
        </div>
    </div>

    <!-- HEADER -->
    <header id="chat-header">
        <div class="back-btn" onclick="logout()">‹</div>
        <div class="user-info">
            <div class="user-avatar" id="my-avatar-display">?</div>
            <div class="user-details">
                <h2>Chat Secreto</h2>
                <p>● En línea</p>
            </div>
        </div>
    </header>

    <!-- MENSAJES -->
    <div id="messages"></div>

    <!-- MENU CONTEXTUAL -->
    <div id="context-menu">
        <div class="react-bar">
            <span onclick="addReaction('❤️')">❤️</span>
            <span onclick="addReaction('😂')">😂</span>
            <span onclick="addReaction('😮')">😮</span>
            <span onclick="addReaction('😢')">😢</span>
            <span onclick="addReaction('🔥')">🔥</span>
        </div>
        <div class="menu-option" onclick="hideForMe()">Eliminar para mí</div>
        <div class="menu-option delete" id="del-everyone-opt" onclick="deleteEveryone()">Eliminar para todos</div>
    </div>

    <!-- INPUT BAR -->
    <div id="input-bar">
        <label for="photo-upload" class="action-icon">📷</label>
        <input type="file" id="photo-upload" style="display: none;" accept="image/*">
        
        <div class="input-wrapper">
            <textarea id="msg-input" placeholder="Enviar mensaje..." rows="1"></textarea>
            <span class="action-icon" style="margin-left: 10px;">😊</span>
        </div>
        
        <div id="send-btn" onclick="sendText()">Enviar</div>
    </div>

    <div id="toast"></div>

    <script>
        // CONFIG FIREBASE (Tus datos actuales)
        const firebaseConfig = {
            apiKey: "AIzaSyCY2qGZrlJ9Fa3JbAkKoWiVL5Jz5YBKT4c",
            authDomain: "chatsecrect-90b82.firebaseapp.com",
            databaseURL: "https://chatsecrect-90b82-default-rtdb.firebaseio.com/",
            projectId: "chatsecrect-90b82",
            storageBucket: "chatsecrect-90b82.firebasestorage.app",
            messagingSenderId: "111901784465",
            appId: "1:111901784465:web:161b363c5991f56daf8230",
            measurementId: "G-7B2N9MR1QR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // VARIABLES DE ESTADO
        let currentUser = localStorage.getItem("tk_user") || "";
        let sessionStartTime = localStorage.getItem("tk_join_time") || 0;
        let hiddenList = JSON.parse(localStorage.getItem("tk_hidden") || "[]");
        let selectedMsgId = null;

        // INICIO AUTOMÁTICO SI YA TIENE NOMBRE
        window.onload = () => {
            if (currentUser) {
                showChat();
            }
        };

        function saveUser() {
            const name = document.getElementById('username-field').value.trim();
            if (!name) return;
            currentUser = name;
            sessionStartTime = Date.now();
            localStorage.setItem("tk_user", name);
            localStorage.setItem("tk_join_time", sessionStartTime);
            showChat();
        }

        function showChat() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-header').style.display = 'flex';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('input-bar').style.display = 'flex';
            document.getElementById('my-avatar-display').textContent = currentUser.charAt(0).toUpperCase();
            loadMessages();
        }

        function loadMessages() {
            db.ref('messages').orderByChild('time').startAt(Number(sessionStartTime)).on('value', snapshot => {
                const container = document.getElementById('messages');
                container.innerHTML = "";

                snapshot.forEach(child => {
                    const id = child.key;
                    const data = child.val();
                    if (hiddenList.includes(id)) return;

                    const isMe = data.user === currentUser;
                    const row = document.createElement('div');
                    row.className = `message-row ${isMe ? 'row-sent' : 'row-received'}`;

                    const bubble = document.createElement('div');
                    bubble.className = `bubble ${isMe ? 'sent' : 'received'}`;
                    
                    // Contenido
                    let content = isMe ? '' : `<span class="msg-user-name">${data.user}</span>`;
                    if (data.type === 'image') {
                        content += `<img src="${data.url}" style="max-width:200px; border-radius:10px; display:block;">`;
                    } else {
                        content += `<span>${data.text}</span>`;
                    }
                    
                    bubble.innerHTML = content;
                    bubble.onclick = (e) => openMenu(e, id, isMe);

                    // Reacciones
                    if (data.reactions) {
                        const rContainer = document.createElement('div');
                        rContainer.className = 'reaction-container';
                        Object.keys(data.reactions).forEach(emoji => {
                            const b = document.createElement('div');
                            b.className = 'reaction-badge';
                            b.textContent = emoji;
                            rContainer.appendChild(b);
                        });
                        bubble.appendChild(rContainer);
                    }

                    row.appendChild(bubble);
                    container.appendChild(row);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // ENVÍO
        function sendText() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            db.ref('messages').push({ user: currentUser, text, time: Date.now(), type: 'text' });
            input.value = "";
            input.style.height = "auto";
            document.getElementById('send-btn').style.display = "none";
        }

        // EVENTOS DE INPUT
        document.getElementById('msg-input').oninput = function() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
            document.getElementById('send-btn').style.display = this.value.trim() ? "block" : "none";
        };

        // SUBIR FOTO
        document.getElementById('photo-upload').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            showToast("Subiendo imagen...");
            const ref = storage.ref(`photos/${Date.now()}_${file.name}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            db.ref('messages').push({ user: currentUser, url, time: Date.now(), type: 'image' });
        };

        // MENÚ CONTEXTUAL
        function openMenu(e, id, isMe) {
            e.stopPropagation();
            selectedMsgId = id;
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = Math.min(e.pageX, window.innerWidth - 210) + 'px';
            menu.style.top = Math.min(e.pageY, window.innerHeight - 150) + 'px';
            document.getElementById('del-everyone-opt').style.display = isMe ? 'block' : 'none';
        }

        function addReaction(emoji) {
            db.ref(`messages/${selectedMsgId}/reactions/${emoji}`).set(true);
            closeMenu();
        }

        function hideForMe() {
            hiddenList.push(selectedMsgId);
            localStorage.setItem("tk_hidden", JSON.stringify(hiddenList));
            closeMenu();
            loadMessages();
        }

        function deleteEveryone() {
            db.ref(`messages/${selectedMsgId}`).remove();
            closeMenu();
        }

        function closeMenu() {
            document.getElementById('context-menu').style.display = 'none';
        }

        function logout() {
            if (confirm("¿Cerrar sesión? Se borrará tu historial de esta sesión.")) {
                localStorage.clear();
                location.reload();
            }
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        document.onclick = closeMenu;

        // Notificaciones
        if (Notification.permission === "default") Notification.requestPermission();
    </script>
</body>
</html>
