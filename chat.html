<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Secreto 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Firebase App y Database -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --text-color: #4a4a4a;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 117, 140, 0.4);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .card {
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 400px;
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--primary-pink); font-size: 2.2rem; }

        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #ffeef2;
            border-radius: 15px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
        }

        button {
            background: linear-gradient(to right, var(--primary-pink), var(--secondary-pink));
            color: white; border: none; padding: 15px 30px;
            border-radius: 25px; font-weight: 600; cursor: pointer;
            width: 100%;
        }

        #chat-container {
            width: 95%;
            max-width: 500px;
            height: 90vh;
            background: var(--glass-bg);
            border-radius: 30px;
            display: none;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 0.9rem;
            position: relative;
            animation: pop 0.3s ease;
        }

        .sent { align-self: flex-end; background: var(--primary-pink); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; color: var(--text-color); border-bottom-left-radius: 2px; }

        .user-label { font-size: 0.7rem; font-weight: 600; margin-bottom: 3px; display: block; opacity: 0.8; }

        #input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        #msg-input { margin: 0; padding: 12px; }

        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h1>¿Tu nombre, linda? 🌸</h1>
            <input type="text" id="username" placeholder="Escribe tu nombre..." autocomplete="off">
            <button onclick="joinChat()">Entrar al Chat</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." autocomplete="off">
            <button onclick="sendMessage()" style="width: auto;">Enviar</button>
        </div>
    </div>

    <script>
        // Configuración de Firebase (Base de datos pública temporal para que funcione YA)
        const firebaseConfig = {
            databaseURL: "https://chat-amor-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";

        function joinChat() {
            const input = document.getElementById('username');
            if (input.value.trim()) {
                myName = input.value.trim();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                loadMessages();
            }
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                db.ref('messages').push({
                    user: myName,
                    text: input.value,
                    time: Date.now()
                });
                input.value = "";
            }
        }

        function loadMessages() {
            db.ref('messages').limitToLast(50).on('value', (snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const div = document.createElement('div');
                    const isMe = data.user === myName;
                    div.className = `message ${isMe ? 'sent' : 'received'}`;
                    
                    div.innerHTML = `
                        <span class="user-label">${data.user}</span>
                        <span>${data.text}</span>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
